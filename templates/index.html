<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Heritage SYNC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1E8B1A;
    --green-dark: #145E11;
    --green-light: #E8F5E5;
    --red: #D42030;
    --red-light: #FDE8EA;
    --cream: #F9FBF7;
    --text: #1A2E18;
    --text-muted: #5A7558;
    --border: rgba(30,139,26,0.15);
    --shadow: 0 20px 60px rgba(30,139,26,0.12);

    /* ── Motion tokens — change one place, affects everything ── */
    --ease-out-ios:   cubic-bezier(0.00, 0.00, 0.20, 1.00); /* decelerate: enter */
    --ease-in-ios:    cubic-bezier(0.40, 0.00, 1.00, 1.00); /* accelerate: exit  */
    --ease-spring:    cubic-bezier(0.34, 1.20, 0.64, 1.00); /* overshoot: popups */
    --dur-exit:  260ms;
    --dur-enter: 310ms;
    --travel:    44%;   /* iOS cards don't fly 120% — they ease ~44% then fade  */
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family:'DM Sans',sans-serif;
    background:var(--cream);
    color:var(--text);
    /* 100dvh = dynamic viewport height — shrinks when browser address bar is visible.
       100vh would include the address bar area, pushing the nav off-screen on mobile.
       Fallback to 100vh for older browsers that don't support dvh. */
    height: 100vh;
    height: 100dvh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }

  /* ── Header ── */
  .app-header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 16px;
    background:#fff;
    border-bottom:2px solid var(--green-light);
    z-index:100;
    flex-shrink:0;
    gap:10px;
  }

  .logo-wrap { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .logo-img {
    height:38px; width:auto;
    flex-shrink:0; object-fit:contain;
  }
  .logo-text h1 {
    font-family:'Fraunces',serif; font-size:16px; font-weight:700;
    color:var(--green-dark); line-height:1;
    display:flex; align-items:center; gap:5px;
  }
  .logo-text h1 .sync-badge {
    font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700;
    background:linear-gradient(135deg,var(--green),var(--green-dark));
    color:#fff; padding:1px 6px; border-radius:5px;
    letter-spacing:1px; vertical-align:middle;
  }
  .logo-text span { font-size:9px; font-weight:500; color:var(--text-muted); letter-spacing:1.2px; text-transform:uppercase; }

  .header-right { display:flex; align-items:center; gap:8px; }

  .counter-badge {
    background:var(--green-light);
    color:var(--green-dark);
    font-size:11px; font-weight:600;
    padding:4px 10px; border-radius:20px;
    border:1px solid var(--border);
    white-space:nowrap;
    /* smooth number change */
    transition: opacity 0.15s var(--ease-out-ios);
  }

  /* ── Category bar ── */
  .category-bar {
    display:flex; gap:8px;
    padding:8px 16px;
    overflow-x:auto;
    background:#fff;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
    scrollbar-width:none;
  }
  .category-bar::-webkit-scrollbar { display:none; }

  .cat-pill {
    flex-shrink:0;
    padding:5px 14px; border-radius:20px;
    border:1.5px solid var(--border);
    background:transparent;
    color:var(--text-muted);
    font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500;
    cursor:pointer; white-space:nowrap;
    /* ── Smooth pill transitions — all properties unified ── */
    transition:
      background  0.22s var(--ease-out-ios),
      border-color 0.22s var(--ease-out-ios),
      color       0.22s var(--ease-out-ios),
      box-shadow  0.22s var(--ease-out-ios),
      transform   0.14s var(--ease-out-ios);
  }
  .cat-pill:hover {
    border-color:var(--green);
    color:var(--green);
    transform: scale(1.04);
  }
  .cat-pill.active {
    background:var(--green);
    border-color:var(--green);
    color:#fff;
    box-shadow:0 3px 10px rgba(30,139,26,.30);
    transform: scale(1.0); /* settle back to rest on active */
  }
  /* Tap feedback — micro-compress on press */
  .cat-pill:active { transform: scale(0.93); }

  /* ── Stage ── */
  .stage {
    flex:1; position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    background:var(--cream);
  }
  .stage::before {
    content:''; position:absolute; top:-80px; right:-80px;
    width:300px; height:300px;
    background:radial-gradient(circle,rgba(30,139,26,.06) 0%,transparent 70%);
    border-radius:50%; pointer-events:none;
  }
  .stage::after {
    content:''; position:absolute; bottom:-60px; left:-60px;
    width:250px; height:250px;
    background:radial-gradient(circle,rgba(212,32,48,.05) 0%,transparent 70%);
    border-radius:50%; pointer-events:none;
  }

  /* Category-switch fade wrapper */
  .cards-container {
    width:100%; height:100%; position:relative;
    transition: opacity 0.18s var(--ease-in-ios);
  }
  .cards-container.switching {
    opacity: 0;
    pointer-events: none;
  }

  /* ── Card base ──────────────────────────────────────────────────────────────
     will-change is NOT set here globally — promoting all 40 cards to compositor
     layers at once wastes GPU memory on mobile. It is applied only to the two
     cards actively animating, via JS, and removed immediately after.
  ─────────────────────────────────────────────────────────────────────────── */
  .card {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:14px;
    opacity:0;
    pointer-events:none;
    /* No transition here — keyframe animations give precise per-card control */
  }

  .card.active {
    opacity:1;
    pointer-events:all;
    /* NO animation here — .active is the settled/resting state only.
       The enter-right / enter-left classes handle the slide-in.
       Having cardEnterFade here caused the blink: every time the cleanup
       setTimeout did classList.remove('enter-right') + classList.add('active'),
       the browser tore down the enterFromRight animation (dropping its
       fill-mode:forwards hold at opacity:1) and immediately started
       cardEnterFade from { opacity:0 } — one flash per swipe. */
  }

  /* ── Exit animations — acceleration curve so the card feels "pulled" away ── */
  .card.exit-left {
    animation: exitLeft var(--dur-exit) var(--ease-in-ios) both;
    pointer-events: none;
  }
  .card.exit-right {
    animation: exitRight var(--dur-exit) var(--ease-in-ios) both;
    pointer-events: none;
  }

  /* ── Enter animations — deceleration curve so the card "lands" softly ──────
     KEY BLINK FIX:
     • NO opacity:1 here — that fought the animation's own "from {opacity:0}"
       keyframe, causing a one-frame flash at the card's rest position.
     • animation-fill-mode:both makes the "from" keyframe (opacity:0,
       translateX) apply *before the first paint*, so the card is never
       visible at position 0 before the animation starts.
  ─────────────────────────────────────────────────────────────────────────── */
  .card.enter-right {
    animation: enterFromRight var(--dur-enter) var(--ease-out-ios) both;
    pointer-events: all;
  }
  .card.enter-left {
    animation: enterFromLeft var(--dur-enter) var(--ease-out-ios) both;
    pointer-events: all;
  }

  /* ── Keyframes — exits + enters only, no separate "initial load" animation ──
     .card.active is the settled state (opacity:1, no animation).
     All motion happens exclusively through exit-left/right + enter-right/left.
  ─────────────────────────────────────────────────────────────────────────── */

  /* Exits — card accelerates out (ease-in), travels 44%, fades at the same time */
  @keyframes exitLeft {
    from { opacity:1; transform:translateX(0); }
    to   { opacity:0; transform:translateX(calc(var(--travel) * -1)); }
  }
  @keyframes exitRight {
    from { opacity:1; transform:translateX(0); }
    to   { opacity:0; transform:translateX(var(--travel)); }
  }

  /* Enters — card decelerates in (ease-out), starts 44% offset, lands at rest */
  @keyframes enterFromRight {
    from { opacity:0; transform:translateX(var(--travel)); }
    to   { opacity:1; transform:translateX(0); }
  }
  @keyframes enterFromLeft {
    from { opacity:0; transform:translateX(calc(var(--travel) * -1)); }
    to   { opacity:1; transform:translateX(0); }
  }

  .card-inner {
    background:#fff;
    border-radius:20px;
    box-shadow:var(--shadow), 0 2px 8px rgba(0,0,0,.06);
    overflow:hidden;
    width:100%; max-width:480px;
    max-height:calc(100vh - 150px);
    display:flex; flex-direction:column;
    border:1px solid rgba(30,139,26,.08);
  }

  .card-image-wrap {
    position:relative; width:100%; flex-shrink:0;
    background:#f0f0f0; overflow:hidden;
  }
  .card-image-wrap img {
    width:100%; aspect-ratio:1; object-fit:cover;
    display:block; max-height:52vh;
  }

  /* Floating Take Quiz button */
  .take-quiz-btn {
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    display:none; align-items:center; gap:7px;
    background:var(--red); color:#fff;
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700;
    letter-spacing:.5px; padding:9px 22px; border-radius:30px; border:none;
    cursor:pointer; box-shadow:0 4px 16px rgba(212,32,48,.4);
    /* Spring curve so the button feels lively when it pops in */
    animation:quizBtnPop .4s var(--ease-spring);
    z-index:10; white-space:nowrap;
    transition: background 0.18s, transform 0.14s var(--ease-out-ios);
  }
  .take-quiz-btn:hover {
    background:#b8192a;
    transform:translateX(-50%) scale(1.05);
  }
  .take-quiz-btn:active { transform:translateX(-50%) scale(0.96); }
  @keyframes quizBtnPop {
    from { opacity:0; transform:translateX(-50%) translateY(14px) scale(0.88); }
    to   { opacity:1; transform:translateX(-50%) translateY(0)   scale(1.00); }
  }

  .card-body { padding:13px 17px 15px; flex-shrink:0; }
  .card-title {
    font-family:'Fraunces',serif; font-size:18px; font-weight:700;
    color:var(--text); margin-bottom:6px; line-height:1.2;
  }
  .card-divider {
    width:36px; height:3px;
    background:linear-gradient(to right,var(--green),var(--red));
    border-radius:2px; margin:8px 0 0;
  }

  /* ── Listen to Summary button ── */
  .listen-btn {
    margin-top:11px;
    display:inline-flex; align-items:center; gap:7px;
    padding:7px 16px; border-radius:20px;
    border:1.5px solid var(--border); background:#fff;
    font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600;
    cursor:pointer; color:var(--text-muted);
    transition:
      background  0.2s var(--ease-out-ios),
      border-color 0.2s var(--ease-out-ios),
      color       0.2s var(--ease-out-ios),
      box-shadow  0.2s var(--ease-out-ios);
  }
  .listen-btn:hover { border-color:var(--green); color:var(--green); }
  .listen-btn.playing {
    background:var(--green); border-color:var(--green); color:#fff;
    box-shadow:0 3px 10px rgba(30,139,26,.3);
  }
  .listen-btn svg { flex-shrink:0; }

  /* ── Nav bar ── */
  .nav-bar {
    display:flex; align-items:center; justify-content:center;
    gap:14px; padding:10px 20px;
    background:#fff; border-top:1px solid var(--border);
    flex-shrink:0;
  }
  .nav-btn {
    width:42px; height:42px; border-radius:50%;
    border:1.5px solid var(--border); background:#fff;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:var(--green);
    transition:
      background  0.2s var(--ease-out-ios),
      border-color 0.2s var(--ease-out-ios),
      color       0.2s var(--ease-out-ios),
      box-shadow  0.2s var(--ease-out-ios),
      transform   0.12s var(--ease-out-ios),
      opacity     0.2s var(--ease-out-ios);
  }
  .nav-btn:hover:not(:disabled) {
    background:var(--green); border-color:var(--green); color:#fff;
    transform:scale(1.08);
    box-shadow:0 4px 12px rgba(30,139,26,.25);
  }
  .nav-btn:active:not(:disabled) { transform:scale(0.92); }
  .nav-btn:disabled { opacity:.30; cursor:not-allowed; }
  .nav-btn svg { width:18px; height:18px; }

  /* ── Progress bar — smooth fill ── */
  .progress-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; min-width:0; }
  .progress-bar-track {
    width:100%; max-width:200px; height:3px;
    background:var(--green-light); border-radius:2px; overflow:hidden;
  }
  .progress-bar-fill {
    height:100%;
    background:linear-gradient(to right,var(--green),var(--red));
    border-radius:2px;
    /* Smooth progress fill — was instant before */
    transition: width 0.32s var(--ease-out-ios);
  }
  .progress-label {
    font-size:11px; color:var(--text-muted); font-weight:500;
    transition: opacity 0.15s var(--ease-out-ios);
  }

  /* ── Loader ── */
  .loader {
    position:fixed; inset:0; background:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:999;
    transition:opacity .5s var(--ease-in-ios), visibility .5s var(--ease-in-ios);
  }
  .loader.hidden { opacity:0; visibility:hidden; }
  .loader-logo-img {
    height:80px; width:auto; object-fit:contain;
    animation:pulse 1.5s ease-in-out infinite; margin-bottom:20px;
  }
  @keyframes pulse {
    0%,100%{transform:scale(1);box-shadow:0 8px 30px rgba(30,139,26,.3)}
    50%{transform:scale(1.06);box-shadow:0 12px 40px rgba(30,139,26,.45)}
  }
  .loader-title { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .loader h2 { font-family:'Fraunces',serif; font-size:22px; color:var(--green-dark); }
  .loader-sync {
    font-family:'DM Sans',sans-serif; font-size:14px; font-weight:700;
    background:linear-gradient(135deg,var(--green),var(--green-dark));
    color:#fff; padding:2px 8px; border-radius:6px; letter-spacing:1.5px;
  }
  .loader p  { font-size:11px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; }
  .loader-dots { display:flex; gap:6px; margin-top:24px; }
  .loader-dots span {
    width:7px; height:7px; background:var(--green); border-radius:50%;
    animation:bounce 1.2s ease-in-out infinite;
  }
  .loader-dots span:nth-child(2){animation-delay:.2s;background:var(--red);}
  .loader-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.5}40%{transform:scale(1);opacity:1}}

  /* ── Empty state ── */
  .empty-state {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; color:var(--text-muted); gap:12px; text-align:center; padding:40px;
  }
  .empty-state svg { width:64px; height:64px; opacity:.3; }
  .empty-state h3 { font-family:'Fraunces',serif; font-size:20px; color:var(--text); }

  /* Swipe hint */
  .swipe-hint {
    position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:6px;
    background:rgba(0,0,0,.55); color:#fff;
    font-size:11px; padding:6px 14px; border-radius:20px;
    animation:fadeHint 3s ease forwards; pointer-events:none; white-space:nowrap;
  }
  @keyframes fadeHint{0%,60%{opacity:1}100%{opacity:0}}

  /* ── Quiz Modal ── */
  .modal-bg {
    position:fixed; inset:0;
    background:rgba(0,0,0,.50);
    backdrop-filter:blur(6px);
    z-index:300;
    display:none; align-items:center; justify-content:center;
    padding:20px;
    /* Fade the scrim */
    opacity:0;
    transition: opacity 0.22s var(--ease-out-ios);
  }
  .modal-bg.show {
    display:flex;
    opacity:1;
  }
  /* Two-step display trick: set display first, then opacity on next frame */
  .modal-bg.show-init {
    display:flex;
    opacity:0;
  }

  .quiz-card {
    background:#fff; border-radius:20px;
    padding:24px; max-width:430px; width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,.2);
    /* Spring pop for the card — feels lively, not stiff */
    animation: modalCardIn 0.38s var(--ease-spring) forwards;
  }

  @keyframes modalCardIn {
    from { opacity:0; transform:scale(0.88) translateY(16px); }
    to   { opacity:1; transform:scale(1)    translateY(0);    }
  }

  .quiz-header {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:5px;
  }
  .quiz-topic { font-size:10px; font-weight:700; letter-spacing:2px; color:var(--green); text-transform:uppercase; }
  .quiz-counter { font-size:11px; font-weight:600; color:var(--text-muted); }

  .quiz-q {
    font-family:'Fraunces',serif; font-size:16px; line-height:1.45;
    color:var(--text); margin:12px 0 16px;
  }

  .quiz-opts { display:flex; flex-direction:column; gap:8px; }
  .quiz-opt {
    padding:10px 14px; border-radius:10px;
    border:1.5px solid var(--border); background:#fff;
    text-align:left; font-family:'DM Sans',sans-serif;
    font-size:13.5px; cursor:pointer; color:var(--text);
    width:100%;
    transition:
      background  0.18s var(--ease-out-ios),
      border-color 0.18s var(--ease-out-ios),
      transform   0.12s var(--ease-out-ios);
  }
  .quiz-opt:hover:not(:disabled) {
    border-color:var(--green);
    background:var(--green-light);
    transform: translateX(3px);
  }
  .quiz-opt:active:not(:disabled) { transform: scale(0.97); }
  .quiz-opt.correct {
    background:var(--green-light); border-color:var(--green);
    color:var(--green-dark); font-weight:600;
    transform: none;
    animation: optCorrect 0.32s var(--ease-spring);
  }
  .quiz-opt.wrong {
    background:var(--red-light); border-color:var(--red); color:var(--red);
    transform: none;
    animation: optWrong 0.28s var(--ease-in-ios);
  }

  @keyframes optCorrect {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  @keyframes optWrong {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-5px); }
    75%     { transform: translateX(5px); }
  }

  .quiz-expl {
    display:none; margin-top:12px; font-size:12.5px;
    color:var(--text-muted); background:var(--green-light);
    padding:9px 13px; border-radius:8px; line-height:1.55;
    opacity:0; transform:translateY(4px);
    transition: opacity 0.22s var(--ease-out-ios), transform 0.22s var(--ease-out-ios);
  }
  .quiz-expl.show {
    display:block;
    /* Force reflow then animate in */
    animation: explIn 0.24s var(--ease-out-ios) forwards;
  }
  @keyframes explIn {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:translateY(0);   }
  }

  .quiz-progress-dots {
    display:flex; gap:6px; justify-content:center; margin:14px 0 4px;
  }
  .q-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--border);
    transition: background 0.25s var(--ease-out-ios), transform 0.2s var(--ease-spring);
  }
  .q-dot.done-correct { background:var(--green); }
  .q-dot.done-wrong   { background:var(--red); }
  .q-dot.current      { background:var(--green-dark); transform:scale(1.4); }

  .quiz-footer { display:flex; gap:10px; margin-top:16px; justify-content:space-between; align-items:center; }
  .quiz-score-lbl { font-size:12px; font-weight:600; color:var(--text-muted); }
  .btn-skip {
    padding:8px 16px; border-radius:8px; border:1.5px solid var(--border);
    background:transparent; font-family:'DM Sans',sans-serif;
    font-size:13px; cursor:pointer; color:var(--text-muted);
    transition: border-color 0.18s, color 0.18s;
  }
  .btn-skip:hover { border-color:var(--text-muted); color:var(--text); }
  .btn-next {
    padding:8px 20px; border-radius:8px; border:none;
    background:var(--green); color:#fff;
    font-family:'DM Sans',sans-serif; font-size:13px;
    font-weight:600; cursor:pointer;
    transition: background 0.18s var(--ease-out-ios), transform 0.12s var(--ease-out-ios);
  }
  .btn-next:hover { background:var(--green-dark); }
  .btn-next:active { transform: scale(0.95); }

  /* Results card */
  .quiz-result { text-align:center; padding:10px 0; }
  .result-ring {
    width:80px; height:80px; border-radius:50%;
    background:var(--green-light); border:3px solid var(--green);
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces',serif; font-size:24px; font-weight:700;
    color:var(--green-dark); margin:0 auto 12px;
    animation: ringPop 0.5s var(--ease-spring);
  }
  @keyframes ringPop {
    from { transform:scale(0); opacity:0; }
    to   { transform:scale(1); opacity:1; }
  }
  .result-msg { font-size:14px; color:var(--text-muted); line-height:1.55; }

  @media(max-width:400px){
    .card-title{font-size:16px;}
    .card-body{padding:10px 12px 12px;}
    .card-inner{border-radius:16px;}
    .counter-badge{display:none;}
  }
</style>
</head>
<body>

<!-- Loader -->
<div class="loader" id="loader">
  <img src="/static/logo.png" class="loader-logo-img" alt="Heritage Logo">
  <div class="loader-title">
    <h2>Heritage</h2>
    <span class="loader-sync">SYNC</span>
  </div>
  <p>Sales &amp; Knowledge Center</p>
  <div class="loader-dots"><span></span><span></span><span></span></div>
</div>

<!-- Header -->
<header class="app-header">
  <div class="logo-wrap">
    <img src="/static/logo.png" class="logo-img" alt="Heritage Logo">
    <div class="logo-text">
      <h1>Heritage <span class="sync-badge">SYNC</span></h1>
      <span>Sales &amp; Knowledge Center</span>
    </div>
  </div>
  <div class="header-right">
    <div class="counter-badge" id="counterBadge">1 / 40</div>
  </div>
</header>

<!-- Category bar -->
<div class="category-bar" id="categoryBar"></div>

<!-- Stage -->
<div class="stage" id="stage">
  <div class="cards-container" id="cardsContainer"></div>
  <button class="take-quiz-btn" id="takeQuizBtn" onclick="triggerQuizNow()">🎯 Take Quiz</button>
</div>

<!-- Nav -->
<div class="nav-bar">
  <button class="nav-btn" id="prevBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="progress-wrap">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">1 of 40</div>
  </div>
  <button class="nav-btn" id="nextBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

<!-- Quiz Modal -->
<div class="modal-bg" id="quizModal">
  <div class="quiz-card" id="quizCard"></div>
</div>

<script>
// ─── Motion constants (mirror CSS custom properties for JS sync) ──────────────
// These MUST match --dur-exit and --dur-enter in CSS exactly.
// Having a single source of truth prevents the JS-lock/CSS-finish desync bug.
const DUR_EXIT  = 260; // ms — matches --dur-exit
const DUR_ENTER = 310; // ms — matches --dur-enter
// Animation lock released AFTER the enter animation fully completes
const ANIM_LOCK_DURATION = DUR_ENTER + 10; // +10ms safety buffer

// ─── SECTION SUMMARIES ────────────────────────────────────────────────────────
// ─── Content loaded from /api/content at init ────────────────────────────────
// These replace the old hardcoded constants. Populated before renderCards() runs
// so the rest of the app is completely unchanged.
let SECTION_SUMMARY = {};
let QUIZ_BANK       = {};

// ─── App state ───────────────────────────────────────────────────────────────
let artworks       = [];
let currentIndex   = 0;
let currentCategory = 'All';
let isAnimating    = false;
const quizEnabled  = true;
let quizShownFor   = new Set();

// Touch
let touchStartX = 0, touchStartY = 0;

// ─── Utility: is current index the last slide of its category? ───────────────
function isLastInSection(index) {
  if (artworks.length === 0) return false;
  if (index >= artworks.length - 1) return true;
  return artworks[index].category !== artworks[index + 1].category;
}

function updateTakeQuizBtn() {
  const btn = document.getElementById('takeQuizBtn');
  if (!btn) return;
  if (!quizEnabled) { btn.style.display = 'none'; return; }
  const art = artworks[currentIndex];
  if (!art) { btn.style.display = 'none'; return; }
  const pending = isLastInSection(currentIndex)
    && QUIZ_BANK[art.category]
    && !quizShownFor.has(art.category);
  btn.style.display = pending ? 'flex' : 'none';
}

function maybeShowQuiz(leavingIndex) {
  if (!quizEnabled) return Promise.resolve(false);
  if (!isLastInSection(leavingIndex)) return Promise.resolve(false);
  const art = artworks[leavingIndex];
  if (!art) return Promise.resolve(false);
  const cat = art.category;
  if (!QUIZ_BANK[cat] || quizShownFor.has(cat)) return Promise.resolve(false);
  quizShownFor.add(cat);
  updateTakeQuizBtn();
  return new Promise(resolve => showQuiz(QUIZ_BANK[cat], resolve));
}

async function triggerQuizNow() {
  const art = artworks[currentIndex];
  if (!art) return;
  const cat = art.category;
  if (!QUIZ_BANK[cat] || quizShownFor.has(cat)) return;
  quizShownFor.add(cat);
  updateTakeQuizBtn();
  await new Promise(resolve => showQuiz(QUIZ_BANK[cat], resolve));
}

// ─── Quiz renderer ───────────────────────────────────────────────────────────
function showQuiz(data, onClose) {
  let qi = 0;
  let score = 0;
  const dotStates = data.qs.map(() => 'pending');

  renderQuestion();

  function buildDots() {
    return data.qs.map((_, i) => {
      let cls = 'q-dot';
      if (i < qi)  cls += dotStates[i] === 'correct' ? ' done-correct' : ' done-wrong';
      if (i === qi) cls += ' current';
      return `<div class="${cls}"></div>`;
    }).join('');
  }

  function renderQuestion() {
    const q = data.qs[qi];
    document.getElementById('quizCard').innerHTML = `
      <div class="quiz-header">
        <span class="quiz-topic">🎯 ${data.topic}</span>
        <span class="quiz-counter">Q${qi+1} of ${data.qs.length}</span>
      </div>
      <p class="quiz-q">${q.q}</p>
      <div class="quiz-opts">
        ${q.opts.map((o,i)=>`<button class="quiz-opt" onclick="answerQ(${i})">${o}</button>`).join('')}
      </div>
      <div class="quiz-expl" id="quizExpl">${q.expl}</div>
      <div class="quiz-progress-dots" id="quizDots">${buildDots()}</div>
      <div class="quiz-footer">
        <span class="quiz-score-lbl" id="quizScoreLbl">Score: ${score}/${qi}</span>
        <div style="display:flex;gap:8px;">
          <button class="btn-skip" onclick="skipQuiz()">Skip all</button>
          <button class="btn-next" id="quizNextBtn" style="display:none;" onclick="nextQuestion()">
            ${qi < data.qs.length - 1 ? 'Next question →' : 'Finish →'}
          </button>
        </div>
      </div>`;

    // Two-step show: set display first, then opacity on next rAF for smooth fade-in
    const modal = document.getElementById('quizModal');
    modal.classList.add('show-init');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => modal.classList.replace('show-init', 'show'));
    });
  }

  window.answerQ = function(idx) {
    const q = data.qs[qi];
    const opts = document.querySelectorAll('.quiz-opt');
    opts.forEach(b => b.disabled = true);
    if (idx === q.ans) {
      score++;
      dotStates[qi] = 'correct';
      opts[idx].classList.add('correct');
    } else {
      dotStates[qi] = 'wrong';
      opts[idx].classList.add('wrong');
      opts[q.ans].classList.add('correct');
    }
    document.getElementById('quizExpl').classList.add('show');
    document.getElementById('quizNextBtn').style.display = 'block';
    document.getElementById('quizScoreLbl').textContent = `Score: ${score}/${qi+1}`;
    document.getElementById('quizDots').innerHTML = buildDots();
  };

  window.nextQuestion = function() {
    qi++;
    if (qi < data.qs.length) {
      // Animate quiz card out then re-render
      const card = document.getElementById('quizCard');
      card.style.animation = `exitLeft ${DUR_EXIT}ms var(--ease-in-ios) forwards`;
      setTimeout(() => {
        card.style.animation = '';
        renderQuestion();
        // Reset card animation
        card.style.animation = `modalCardIn 0.38s var(--ease-spring) forwards`;
      }, DUR_EXIT);
    } else {
      showResult();
    }
  };

  function showResult() {
    const pct = Math.round((score / data.qs.length) * 100);
    const msg = pct === 100 ? 'Perfect score! Excellent knowledge.' :
                pct >= 66   ? 'Good job! Review any missed points.' :
                              "Keep studying — you'll nail it next time.";
    document.getElementById('quizCard').innerHTML = `
      <div class="quiz-result">
        <div class="result-ring">${pct}%</div>
        <div style="font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px;">${data.topic} Complete</div>
        <div class="result-msg">${msg}<br>You scored <strong>${score} out of ${data.qs.length}</strong>.</div>
        <button class="btn-next" style="margin-top:18px;" onclick="closeQuiz()">Continue →</button>
      </div>`;
  }

  window.skipQuiz = window.closeQuiz = function() {
    const modal = document.getElementById('quizModal');
    // Fade scrim out smoothly before hiding
    modal.style.opacity = '0';
    setTimeout(() => {
      modal.classList.remove('show', 'show-init');
      modal.style.opacity = '';
      if (typeof onClose === 'function') onClose(true);
    }, 220);
  };
}

// ─── Categories ──────────────────────────────────────────────────────────────
async function loadCategories() {
  const res  = await fetch('/api/categories');
  const cats = await res.json();
  const bar  = document.getElementById('categoryBar');
  bar.innerHTML = '';
  cats.forEach(cat => {
    const pill = document.createElement('button');
    pill.className = 'cat-pill' + (cat === currentCategory ? ' active' : '');
    pill.textContent = cat;
    pill.onclick = async () => {
      const pendingQuiz = await maybeShowQuiz(currentIndex);
      currentCategory = cat;
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');

      // ── Category switch: fade container out, swap content, fade back in ──
      const container = document.getElementById('cardsContainer');
      container.classList.add('switching');
      await new Promise(r => setTimeout(r, 180)); // wait for fade-out
      await loadArtworks();
      container.classList.remove('switching');
    };
    bar.appendChild(pill);
  });
}

// ─── Artworks ────────────────────────────────────────────────────────────────
async function loadArtworks() {
  const url = currentCategory === 'All'
    ? '/api/artworks'
    : `/api/artworks?category=${encodeURIComponent(currentCategory)}`;
  const res = await fetch(url);
  artworks  = await res.json();
  currentIndex = 0;
  renderCards();
  updateUI();
}

// ─── Render cards ─────────────────────────────────────────────────────────────
function renderCards() {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';

  if (artworks.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      <h3>No artworks found</h3>
      <p>Try a different category</p>
    </div>`;
    return;
  }

  artworks.forEach((art, i) => {
    const isLast = (i === artworks.length - 1) || (artworks[i].category !== artworks[i + 1].category);
    const hasSummary = isLast && SECTION_SUMMARY[art.category];
    const listenHTML = hasSummary ? `
      <button class="listen-btn" id="listen-btn-${i}" onclick="toggleSummaryAudio(${i})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/></svg>
        Listen to Summary
      </button>` : '';
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-image-wrap">
          <img src="/static/uploads/${encodeURIComponent(art.filename)}"
               alt="${art.title}" loading="${i < 3 ? 'eager' : 'lazy'}">
        </div>
        <div class="card-body">
          <div class="card-title">${art.title}</div>
          <div class="card-divider"></div>
          ${listenHTML}
        </div>
      </div>`;
    container.appendChild(card);
  });

  if (!sessionStorage.getItem('hintShown')) {
    const hint = document.createElement('div');
    hint.className = 'swipe-hint';
    hint.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg> Swipe or use arrow keys`;
    document.getElementById('stage').appendChild(hint);
    setTimeout(() => hint.remove(), 3200);
    sessionStorage.setItem('hintShown', '1');
  }
}

// ─── Summary audio ────────────────────────────────────────────────────────────
let summaryPlaying = null;

function toggleSummaryAudio(i) {
  const btn = document.getElementById(`listen-btn-${i}`);
  const art = artworks[i];
  if (!art) return;
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    if (summaryPlaying === i) { summaryPlaying = null; resetListenBtn(i); return; }
    if (summaryPlaying !== null) resetListenBtn(summaryPlaying);
  }
  const text = `Section summary for ${art.category}. ${SECTION_SUMMARY[art.category]}`;
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.88; utt.pitch = 1;
  const voices = speechSynthesis.getVoices();
  const voice = voices.find(v => v.lang === 'en-IN') || voices.find(v => v.lang.startsWith('en'));
  if (voice) utt.voice = voice;
  utt.onstart = () => {
    summaryPlaying = i;
    if (btn) {
      btn.classList.add('playing');
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg> Stop`;
    }
  };
  utt.onend = utt.onerror = () => { summaryPlaying = null; resetListenBtn(i); };
  window.speechSynthesis.speak(utt);
}

function resetListenBtn(i) {
  const btn = document.getElementById(`listen-btn-${i}`);
  if (btn) {
    btn.classList.remove('playing');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/></svg> Listen to Summary`;
  }
}

function stopSummaryAudio() {
  if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
  if (summaryPlaying !== null) { resetListenBtn(summaryPlaying); summaryPlaying = null; }
}

// ─── Card transition ──────────────────────────────────────────────────────────
function showCard(newIndex, direction) {
  if (isAnimating || artworks.length === 0) return;
  stopSummaryAudio();

  const oldCard = document.getElementById(`card-${currentIndex}`);
  const newCard = document.getElementById(`card-${newIndex}`);
  if (!newCard) return;

  isAnimating = true;

  // Promote ONLY these two cards to compositor layers for the duration of
  // the animation — not all 40 cards permanently (wasteful on mobile GPU).
  oldCard.style.willChange = 'transform, opacity';
  newCard.style.willChange = 'transform, opacity';

  // Exit: remove active first so its opacity:1 rule no longer applies,
  // then add exit class — animation's "from {opacity:1}" takes over cleanly.
  oldCard.classList.remove('active');
  oldCard.classList.add(direction === 'next' ? 'exit-left' : 'exit-right');

  // Enter: add animation class ONLY — no inline opacity or pointerEvents.
  // animation-fill-mode:both (set in CSS) applies the "from {opacity:0,
  // translateX}" keyframe before the very first paint, so the card is never
  // briefly visible at its rest position. This eliminates the blink.
  newCard.classList.add(direction === 'next' ? 'enter-right' : 'enter-left');

  // Lock releases after enter animation fully completes (synced constant).
  setTimeout(() => {
    // Clean up exit card
    oldCard.classList.remove('exit-left', 'exit-right');
    oldCard.style.willChange = '';

    // Settle new card into active state, remove animation class
    newCard.classList.remove('enter-right', 'enter-left');
    newCard.classList.add('active');
    newCard.style.willChange = '';

    currentIndex = newIndex;
    updateUI();
    isAnimating = false;
  }, ANIM_LOCK_DURATION);
}

async function goNext() {
  if (currentIndex >= artworks.length - 1) return;
  const from = currentIndex;
  const to   = currentIndex + 1;
  const quizFired = await maybeShowQuiz(from);
  if (!isAnimating) showCard(to, 'next');
}

function goPrev() {
  if (currentIndex > 0) showCard(currentIndex - 1, 'prev');
}

function updateUI() {
  const total = artworks.length;
  const idx   = total > 0 ? currentIndex + 1 : 0;
  document.getElementById('counterBadge').textContent  = `${idx} / ${total}`;
  document.getElementById('progressLabel').textContent = `${idx} of ${total}`;
  document.getElementById('progressFill').style.width  = total > 0 ? `${(idx/total)*100}%` : '0%';
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === total - 1;
  updateTakeQuizBtn();
}

// ─── Controls ─────────────────────────────────────────────────────────────────
document.getElementById('prevBtn').onclick = () => goPrev();
document.getElementById('nextBtn').onclick = () => goNext();

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goNext();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goPrev();
  if (e.key === 'Escape') { if (typeof skipQuiz === 'function') skipQuiz(); }
});

document.getElementById('stage').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.getElementById('stage').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    dx < 0 ? goNext() : goPrev();
  }
}, { passive: true });

// ─── Init ─────────────────────────────────────────────────────────────────────
async function loadContent() {
  // Fetch summaries + quizzes from backend — replaces old hardcoded constants.
  // Runs once at startup; the rest of the app reads SECTION_SUMMARY / QUIZ_BANK
  // exactly as before, so nothing else needs to change.
  try {
    const res  = await fetch('/api/content');
    const data = await res.json();
    SECTION_SUMMARY = data.summaries || {};
    QUIZ_BANK       = data.quizzes   || {};
  } catch(e) {
    console.warn('[heritage] Could not load content from /api/content:', e);
    // App still works — SECTION_SUMMARY and QUIZ_BANK stay empty objects,
    // meaning no Listen / no Quiz for any category until content loads.
  }
}

async function init() {
  await loadContent();          // ← fetch summaries + quizzes first
  await loadCategories();
  await loadArtworks();
  setTimeout(() => document.getElementById('loader').classList.add('hidden'), 800);
}

init();
</script>
</body>
</html>
